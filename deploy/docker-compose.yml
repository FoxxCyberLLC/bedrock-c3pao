services:
  c3pao:
    image: ghcr.io/foxxcyberllc/bedrock-c3pao:latest
    # Always pull on `docker compose up`. Without this, Compose reuses the
    # locally-cached image even when a newer :latest exists upstream.
    pull_policy: always
    ports:
      - "3001:3001"
    volumes:
      - c3pao_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  c3pao_data:
