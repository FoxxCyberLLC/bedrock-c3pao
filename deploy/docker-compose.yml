services:
  c3pao:
    image: ghcr.io/foxxdev-collab/bedrock-c3pao:latest
    ports:
      - "3001:3001"
    volumes:
      - c3pao_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  c3pao_data:
