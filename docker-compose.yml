services:
  c3pao:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SAAS_API_URL=${SAAS_API_URL}
      - INSTANCE_API_KEY=${INSTANCE_API_KEY}
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXT_PUBLIC_APP_URL=${APP_URL:-http://localhost:3000}
      - SYNC_INTERVAL_MS=${SYNC_INTERVAL_MS:-30000}
      - CACHE_TTL_MS=${CACHE_TTL_MS:-300000}
    volumes:
      - c3pao_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  c3pao_data:
