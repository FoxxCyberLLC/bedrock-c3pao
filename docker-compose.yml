services:
  c3pao:
    build: .
    ports:
      - "3001:3001"
    environment:
      - BEDROCK_API_URL=${BEDROCK_API_URL:-http://host.docker.internal:8080}
      - AUTH_SECRET=${AUTH_SECRET:-changeme-generate-a-real-secret}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
      - NODE_ENV=${NODE_ENV:-production}
      - FORCE_HTTPS=${FORCE_HTTPS:-false}
    volumes:
      - c3pao_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  c3pao_data:
